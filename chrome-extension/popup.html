<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cesly - Dodaj ogłoszenie</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
      color: white;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -0.5px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      color: #1f2937;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .status {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
    }

    .status.info {
      background: #dbeafe;
      color: #1e40af;
    }

    .status.success {
      background: #dcfce7;
      color: #166534;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .preview {
      margin: 16px 0;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      font-size: 13px;
    }

    .preview strong {
      display: block;
      margin-bottom: 4px;
      color: #374151;
    }

    .preview p {
      color: #6b7280;
      margin-bottom: 8px;
    }

    .images {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .images img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      border: 2px solid #e5e7eb;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    button.primary {
      background: #1e40af;
      color: white;
    }

    button.primary:hover:not(:disabled) {
      background: #1e3a8a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <h1>Cesly</h1>
  </div>

  <div class="card">
    <div id="status" class="status info">
      Kliknij "Wyciągnij dane", aby rozpocząć
    </div>

    <div id="preview" style="display: none;"></div>

    <button id="extractBtn" class="primary">
      Wyciągnij dane z posta
    </button>

    <button id="openBtn" class="primary" style="display: none;">
      Otwórz formularz na Cesly
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
